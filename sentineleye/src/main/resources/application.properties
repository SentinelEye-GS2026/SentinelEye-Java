spring.application.name=sentineleye

# datasource
spring.datasource.driverClassName=org.h2.Driver

# Dados de conexao com o banco H2
spring.datasource.url=jdbc:h2:mem:sentineldb
spring.datasource.username=sa
spring.datasource.password=

# Configuracao do cliente web do banco H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuracao para mostrar o SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.show_sql=true

# Carregar dados iniciais apos o schema ser criado
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
